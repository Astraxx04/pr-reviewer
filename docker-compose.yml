services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: pr_reviewer
      POSTGRES_PASSWORD: pr_reviewer
      POSTGRES_DB: pr_reviewer
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pr_reviewer"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # One-shot migration step. Runs the server image with MIGRATE_ONLY=true to
  # apply app (golang-migrate) + River migrations, then exits. app waits for it
  # to complete successfully before starting — migrations are an explicit step,
  # the server no longer migrates on boot.
  migrate:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://pr_reviewer:pr_reviewer@postgres:5432/pr_reviewer?sslmode=disable
      MIGRATE_ONLY: "true"
      # Set SKIP_MIGRATIONS=true (in .env or the shell) to make this a no-op that
      # exits 0, so `app` still starts without applying migrations.
      SKIP_MIGRATIONS: "${SKIP_MIGRATIONS:-false}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://pr_reviewer:pr_reviewer@postgres:5432/pr_reviewer?sslmode=disable
      SERVER_PORT: "8001"
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
    ports:
      - "3000:3000"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
