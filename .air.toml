root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/server ./cmd/server"
  bin = "./tmp/server"
  full_bin = "./tmp/server"
  include_ext = ["go", "tpl", "tmpl", "html", "env"]
  exclude_dir = ["tmp", "vendor", "web", "bin", "deploy", "docs"]
  exclude_file = []
  include_file = [".env"]
  exclude_regex = ["_test\\.go"]
  include_dir = []
  delay = 1000
  kill_delay = "500ms"
  stop_on_error = true
  send_interrupt = true
  rerun = false

[log]
  time = false
  main_only = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
