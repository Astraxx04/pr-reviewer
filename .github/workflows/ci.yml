name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on a PR branch when new commits are pushed, but never
# cancel runs on main (cancel-in-progress is false there) so merge builds always
# complete. The group is keyed by ref, so each PR branch / main has its own lane.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: pr_reviewer
          POSTGRES_PASSWORD: pr_reviewer
          POSTGRES_DB: pr_reviewer
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgres://pr_reviewer:pr_reviewer@localhost:5432/pr_reviewer?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run tests
        run: go test -race -count=1 ./...
      - name: Schema drift check (migrations vs models)
        run: go test -tags=integration -run TestSchemaDrift -count=1 ./internal/db/...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build binaries
        run: |
          CGO_ENABLED=0 go build -o /dev/null ./cmd/server
          CGO_ENABLED=0 go build -o /dev/null ./cmd/migrate
          CGO_ENABLED=0 go build -o /dev/null ./cmd/prrev

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run build
