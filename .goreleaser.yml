version: 2

# This release ships ONLY the prrev CLI. The server (cmd/server) and migrations
# (cmd/migrate) are not part of the release — deploy those from source or
# docker-compose. See README / docs for self-hosting the backend.
project_name: prrev

before:
  hooks:
    - go mod tidy

builds:
  - id: cli
    main: ./cmd/prrev
    binary: prrev
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: cli
    ids: [cli]
    name_template: "prrev_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md

# Homebrew cask published to a separate tap repo. Casks are the current
# GoReleaser mechanism for pre-built binaries (the old `brews` formula is
# deprecated). Casks are macOS-only — Linux users should use install.sh or
# `go install`.
homebrew_casks:
  - name: prrev
    ids: [cli]
    homepage: "https://github.com/Astraxx04/pr-reviewer"
    description: "CLI for the PR Reviewer service"
    license: "MIT"
    caveats: |
      The prrev binary is not yet code-signed/notarized by Apple. If macOS
      Gatekeeper blocks it on first run, clear the quarantine flag with:

        xattr -dr com.apple.quarantine "$(brew --prefix)/bin/prrev"

      Then sign in:

        prrev auth login --server https://your-server
    repository:
      owner: Astraxx04
      name: homebrew-tap
      branch: main
      # The default Actions GITHUB_TOKEN can't push to another repo; supply a PAT
      # with contents:write on the tap repo as the HOMEBREW_TAP_TOKEN secret.
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: "{{ .Env.GITHUB_REPOSITORY_OWNER }}"
    name: pr-reviewer
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  footer: |
    ## Install the CLI

    ```bash
    # Homebrew (macOS)
    brew install Astraxx04/tap/prrev

    # go install
    go install github.com/Astraxx04/pr-reviewer/cmd/prrev@latest

    # install script (macOS/Linux)
    curl -fsSL https://raw.githubusercontent.com/{{ .Env.GITHUB_REPOSITORY }}/main/install.sh | sh
    ```
