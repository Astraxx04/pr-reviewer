version: 2

project_name: pr-reviewer

before:
  hooks:
    - go mod tidy

builds:
  - id: server
    main: ./cmd/server
    binary: pr-reviewer
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

  - id: migrate
    main: ./cmd/migrate
    binary: pr-reviewer-migrate
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

  - id: cli
    main: ./cmd/prrev
    binary: prrev
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  # Full bundle (server + migrate + prrev) — used by install.sh.
  - id: default
    ids: [server, migrate, cli]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - docker-compose.yml
      - .env.example

  # CLI-only bundle — used by the Homebrew cask so `brew install prrev`
  # installs just the CLI, not the server binaries.
  - id: cli
    ids: [cli]
    name_template: "prrev_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md

# Homebrew cask published to a separate tap repo. Casks are the current
# GoReleaser mechanism for pre-built binaries (the old `brews` formula is
# deprecated). Casks are macOS-only — Linux users should use install.sh or
# `go install`.
homebrew_casks:
  - name: prrev
    ids: [cli] # pull from the CLI-only archive
    homepage: "https://github.com/Astraxx04/pr-reviewer"
    description: "CLI for the PR Reviewer service"
    license: "MIT"
    caveats: |
      The prrev binary is not yet code-signed/notarized by Apple. If macOS
      Gatekeeper blocks it on first run, clear the quarantine flag with:

        xattr -dr com.apple.quarantine "$(brew --prefix)/bin/prrev"

      Then sign in:

        prrev auth login --server https://your-server
    repository:
      owner: Astraxx04
      name: homebrew-tap
      branch: main
      # The default Actions GITHUB_TOKEN can't push to another repo; supply a PAT
      # with contents:write on the tap repo as the HOMEBREW_TAP_TOKEN secret.
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

dockers:
  - id: server
    ids: [server]
    # ghcr/Docker repository names must be lowercase, but the owner login can
    # contain uppercase (Astraxx04) — so lowercase it here.
    image_templates:
      - "ghcr.io/{{ tolower .Env.GITHUB_REPOSITORY_OWNER }}/pr-reviewer:{{ .Version }}"
      - "ghcr.io/{{ tolower .Env.GITHUB_REPOSITORY_OWNER }}/pr-reviewer:latest"
    # Uses the prebuilt binary (see Dockerfile.release) — GoReleaser's build
    # context has the compiled artifact, not the Go source.
    dockerfile: Dockerfile.release
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title=pr-reviewer"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"

release:
  github:
    owner: "{{ .Env.GITHUB_REPOSITORY_OWNER }}"
    name: pr-reviewer
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  footer: |
    ## Docker

    ```
    docker pull ghcr.io/{{ tolower .Env.GITHUB_REPOSITORY_OWNER }}/pr-reviewer:{{ .Version }}
    ```

    ## Quick install

    ```bash
    curl -fsSL https://raw.githubusercontent.com/{{ .Env.GITHUB_REPOSITORY }}/main/install.sh | sh
    ```
